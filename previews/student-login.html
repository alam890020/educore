<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduCore — Student Login</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/preview-styles.css">
<style>
  :root{
    --role-color:#7c3aed;
    --role-glow:rgba(124,58,237,.1);
    --role-shadow:rgba(124,58,237,.3);
  }
  .logo-mark{background:linear-gradient(135deg,#7c3aed,#db2777)}
  .login-btn{background:linear-gradient(135deg,#7c3aed,#db2777)}
  .role-badge{background:rgba(124,58,237,.08);color:#7c3aed;border:1px solid rgba(124,58,237,.2)}
</style>
</head>
<body>
<a href="index.html" class="back-link">← All Previews</a>

<div class="login-page">
  <div class="login-bg"></div>
  <div class="login-grid"></div>
  
  <div class="login-container fade-in">
    <div class="login-logo">
      <div class="logo-mark">E</div>
      <div class="logo-text">Edu<span>Core</span></div>
    </div>
    
    <div class="login-card">
      <span class="role-badge">🎓 Student Portal</span>
      <h2>Student Sign In</h2>
      <p class="subtitle">Access your classes, grades & assignments</p>
      
      <div class="field-group">
        <label>Student ID / Email</label>
        <input type="email" placeholder="student@school.educore.io">
      </div>
      
      <div class="field-group">
        <label>Password</label>
        <input type="password" placeholder="Enter your password">
      </div>
      
      <button class="login-btn" onclick="window.location.href='student-dashboard.html'">Sign In as Student →</button>
      
      <div class="login-extras">
        <a href="#">Forgot Password?</a>
        <span>Ask your class teacher</span>
      </div>
      
      <div class="demo-credentials">
        <div class="demo-title">Demo Credentials</div>
        <div class="demo-box">
          <div class="demo-row">
            <span class="demo-key">Student ID</span>
            <span class="demo-val">STU2024001</span>
          </div>
          <div class="demo-row">
            <span class="demo-key">Password</span>
            <span class="demo-val">student@2024</span>
          </div>
        </div>
      </div>
    </div>
    
    <div class="login-footer">
      Powered by <a href="#">EduCore</a> School Management System
    </div>
  </div>
</div>

</body>
</html>
